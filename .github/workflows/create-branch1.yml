name: Create branch1

on:
  push:
    branches:
      - copilot/add-readme-and-requirements

jobs:
  create-branch1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create branch1 from current commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/heads/branch1',
                sha: sha
              });
              console.log(`Created branch1 at ${sha}`);
            } catch (e) {
              if (e.status === 422) {
                // branch already exists — update it
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'heads/branch1',
                  sha: sha,
                  force: true
                });
                console.log(`Updated branch1 to ${sha}`);
              } else {
                throw e;
              }
            }
